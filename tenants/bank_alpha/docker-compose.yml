version: '3'
services:
  node:
    image: ethereum/client-go:latest
    container_name: arcana_bank_alpha
    volumes:
      - ./data:/root/.ethereum
    ports:
      - "8546:8545"
      - "30304:30303"
    command:
      - --networkid=777
      - --http
      - --http.addr=0.0.0.0
      - --http.vhosts=*
      - --http.api=eth,net,web3,personal,miner
      - --mine
      - --allow-insecure-unlock
      - --miner.etherbase=0x70997970C51812dc3A010C7d01b50e0d17dc79ee
