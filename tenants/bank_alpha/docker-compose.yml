version: '3'
services:
  node:
    image: ethereum/client-go:latest
    container_name: arcana_bank_alpha
    volumes:
      - ./data:/root/.ethereum
      - ./bank_genesis.json:/root/genesis.json
    ports:
      - "8546:8545" # Private RPC for the Bank
      - "30304:30303" # P2P Port
    command:
      --datadir /root/.ethereum init /root/genesis.json && 
      --networkid 777 --http --http.addr "0.0.0.0" --mine
